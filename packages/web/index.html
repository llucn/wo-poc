<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Work Order System</title>
    <base href="/" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <script>
      // Early-paint theme application: read the user's saved theme
      // (or fall back to the OS preference) BEFORE any stylesheet
      // evaluates so the correct palette renders on first paint.
      (function () {
        try {
          var saved = localStorage.getItem('wo-theme');
          var theme =
            saved === 'light' || saved === 'dark'
              ? saved
              : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
